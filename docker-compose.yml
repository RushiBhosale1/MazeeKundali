version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: kundali_postgres
    environment:
      POSTGRES_USER: kundali_user
      POSTGRES_PASSWORD: kundali_pass
      POSTGRES_DB: kundali_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kundali_user -d kundali_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kundali_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
